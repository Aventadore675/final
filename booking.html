<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Réserver un trajet - Move</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="booking-container">
        <h1>Book a ride</h1>
        <p>Enter your trip details</p>
        
        <form>
            <div class="form-group">
                <label>Pickup Location</label>
                <input type="text" placeholder="Where from?" required>
            </div>
            
            <div class="form-group">
                <label>Destination</label>
                <input type="text" placeholder="Where to?" required>
            </div>

            <div class="form-group">
                <label>Date & Time</label>
                <input type="datetime-local" required>
            </div>
            
            <button type="submit" class="btn-submit">Confirm Ride</button>
        </form>
        
        <a href="index.html" class="back-link">← Back to home</a>
    </div>

</body>
</html>
