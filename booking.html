<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request a Ride</title>
    <link rel="stylesheet" href="booking.css">
</head>
<body>
    <div class="booking-container">
        <h1>Request a ride</h1>
        <p>Where are we going today?</p>
        <form>
            <div class="form-group">
                <label>Pickup Location</label>
                <input type="text" placeholder="Enter pickup location" required>
            </div>
            <div class="form-group">
                <label>Destination</label>
                <input type="text" placeholder="Enter destination" required>
            </div>
            <button type="submit" class="btn-submit">Find a Driver</button>
        </form>
        <a href="index.html" class="back-link">← Back to home</a>
    </div>
</body>
</html>
