<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explore the City - Move</title>
    <link rel="stylesheet" href="explore.css">
</head>
<body>

    <header class="explore-header">
        <h1>Discover Your City</h1>
        <p>The most beautiful destinations, just a ride away.</p>
    </header>

    <div class="explore-grid">
        <div class="destination-card">
            <img src="https://images.unsplash.com/photo-1499856871958-5b9627545d1a" alt="Paris">
            <div class="overlay">
                <h3>Historic Center</h3>
                <p>Monuments & Architecture</p>
            </div>
        </div>

        <div class="destination-card">
            <img src="https://images.unsplash.com/photo-1555109307-f7d9da25c244" alt="Business">
            <div class="overlay">
                <h3>Modern District</h3>
                <p>Skyscrapers & Skyline</p>
            </div>
        </div>

        <div class="destination-card">
            <img src="https://images.unsplash.com/photo-1514933651103-005eec06c04b" alt="Nightlife">
            <div class="overlay">
                <h3>Nightlife</h3>
                <p>Bars & Restaurants</p>
            </div>
        </div>
    </div>

    <div class="footer-explore">
        <a href="index.html" class="btn-home">← Back to Homepage</a>
    </div>

</body>
</html>
