<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Become a Driver</title>
    <link rel="stylesheet" href="driver-signup.css">
</head>
<body>
    <div class="signup-container">
        <h1>Join the Fleet</h1>
        <form>
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" placeholder="Your name" required>
            </div>
            <div class="input-group">
                <label>Vehicle Model</label>
                <input type="text" placeholder="Ex: Tesla Model 3" required>
            </div>
            <button type="submit" class="btn-driver">Register Now</button>
        </form>
        <a href="index.html" class="back-home">← Back to home</a>
    </div>
</body>
</html>
